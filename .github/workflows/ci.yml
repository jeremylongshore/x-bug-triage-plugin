name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  lint-json:
    name: Validate JSON Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON files
        run: |
          set -e
          for f in .claude-plugin/plugin.json .mcp.json hooks/hooks.json config/*.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))"
          done
          echo "All JSON files valid."

  validate-schema:
    name: Validate SQLite Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap database
        run: bun run db:migrate

      - name: Verify tables exist
        run: |
          sqlite3 data/triage.db ".tables" | tr ' ' '\n' | sort > /tmp/tables.txt
          for table in audit_log candidates cluster_posts clusters issue_links overrides schema_version suppression_rules triage_runs; do
            grep -q "^${table}$" /tmp/tables.txt || { echo "MISSING TABLE: $table"; exit 1; }
          done
          echo "All 9 tables present."
